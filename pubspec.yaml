name: jaeger_flutter
description: Mobile app for Jaeger distributed tracing.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: '>=3.38.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  dio: ^5.9.0
  native_dio_adapter: ^1.4.0

  # State management and routing
  flutter_riverpod: ^3.2.0
  go_router: ^17.0.1

  # Data models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Storage
  flutter_secure_storage: ^10.3.0
  shared_preferences: ^2.5.3

  # User-installed certificates on Android
  flutter_user_certificates_android: ^0.0.1

  # UI / utilities
  intl: ^0.20.2
  url_launcher: ^6.3.1
  package_info_plus: ^10.1.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  test: ^1.26.3
  build_runner: ^2.5.0
  freezed: ^3.1.0
  json_serializable: ^6.10.0
  flutter_lints: ^6.0.0
  shared_preferences_platform_interface: ^2.4.0

flutter:
  uses-material-design: true
